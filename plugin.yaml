name: serverchan-bot
version: 0.1.0
description: "Server酱³ Bot bridge for Hermes CLI — 轮询入站消息注入会话，自动回发回复"
author: sup_hermes_agent via GPT-5.4
provides_tools:
  - serverchan_send_message
  - serverchan_get_updates
  - serverchan_bot_status
provides_hooks:
  - pre_llm_call
  - post_llm_call
  - on_session_start
  - on_session_end
requires_env:
  - name: SERVERCHAN_BOT_TOKEN
    description: "Server酱³ Bot Token"
    url: "https://sc3.ft07.com/"
    secret: true
  - name: SERVERCHAN_API_BASE_URL
    description: "自定义 API 地址（可选，默认 https://bot-go.apijia.cn）"
    secret: false
